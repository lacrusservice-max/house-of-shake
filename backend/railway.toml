[build]
builder = "dockerfile"

[deploy]
# Este startCommand SOBRESCRIBE el CMD del Dockerfile. Antes era solo
# "node src/index.js", por lo que las migraciones y el seed nunca corrían en
# producción (el CMD del Dockerfile que sí los incluye quedaba ignorado).
#
# `|| true` en migrate/seed: la API debe arrancar siempre. Un fallo de seed o
# de migración se registra en logs pero nunca deja el servicio caído.
startCommand = "npx prisma migrate deploy || true; node prisma/seed.js || true; node src/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
