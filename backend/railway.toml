[build]
builder = "dockerfile"

[deploy]
# OJO: este startCommand SOBRESCRIBE el CMD del Dockerfile, por lo que
# `prisma migrate deploy` y `prisma/seed.js` NO se ejecutan en cada deploy.
# Se intentó encadenarlos aquí y el deploy falló el healthcheck, así que se
# mantiene el arranque simple y estable.
#
# ⇒ Migraciones y seed deben correrse a mano cuando haga falta:
#      railway run npx prisma migrate deploy
#      railway run node prisma/seed.js
startCommand = "node src/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
